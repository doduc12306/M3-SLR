task: ISLR
data:
  model_name: UFOneView
  base_url: /app/data
  dataset_name: MultiVSL200
  temporal_stride: 3
  num_output_frames: 16
  crop_two_hand: true
  transform_cfg:
    index_setting:
      - segment
      - pad
      - segment
      - pad
  vid_transform:
    IMAGE_SIZE: 224
    NORM_MEAN_IMGNET: [0.485, 0.456, 0.406]
    NORM_STD_IMGNET: [0.229, 0.224, 0.225]
  SHOULDER_DIST_EPSILON: 1.2
  WRIST_DELTA: 0.15
  label_folder: MultiVSL200/labelCenter
  data_type: labels

training:
  test: true
  device: cpu
  pretrained: true
  pretrained_model: /app/model/best_checkpoints.pth
  random_seed: 42
  batch_size: 1
  criterion: MyCustomLoss
  optimzer: Adam
  lr_scheduler: StepLR
  learning_rate: 0.0001
  w_decay: 1e-4
  lr_step_size: 10
  gamma: 0.8
  top_k: 5
  num_accumulation_steps: 1
  patience: 10
  verbose: false
  delta: 0
  is_early_stopping: false
  gradient_clip_val: 0
  log_train_step: false
  log_steps: 50
  evaluate_step: 250
  evaluate_strategy: epoch

model:
  num_classes: 199
  maskFeat: false
  pretraiend: false
