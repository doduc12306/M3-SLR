task: ISLR
data:
  model_name: UFOneView
  # Đã sửa sang đường dẫn thực tế trên máy Windows của bạn
  base_url: "C:/Users/Duc Do/Downloads/M3-SLR/data"
  dataset_name: MultiVSL200
  temporal_stride: 3
  num_output_frames: 16
  crop_two_hand: true
  transform_cfg:
    index_setting:
      - segment #train_p
      - pad #train_m
      - segment #test_p
      - pad #test_m
  vid_transform:
    IMAGE_SIZE: 224
    NORM_MEAN_IMGNET: [0.485, 0.456, 0.406]
    NORM_STD_IMGNET: [0.229, 0.224, 0.225]
  SHOULDER_DIST_EPSILON: 1.2
  WRIST_DELTA: 0.15
  # MultiVSL200 labels in this workspace
  label_folder: MultiVSL200/labelCenter
  # If videos are placed under data/MultiVSL200_videos
  video_folder: MultiVSL200_videos
  data_type: labels

training:
  test: true
  coefficient:
    cls_x: 1
    cts_x: 1
    cosine_x: 1
  label_smoothing: 0
  # Ép chạy trên CPU
  device: cpu
  overwrite: true
  log_freq: 1
  experiment_name: "UFOneView Testing on CPU (OneView Mode)"
  model_dir: results/vtn_att_poseflow/vsl
  random_seed: 42
  shuffle: True
  # QUAN TRỌNG: Để 0 trên Windows để tránh lỗi BrokenPipe
  num_workers: 0
  prefetch_factor: 2
  batch_size: 1
  total_epoch: 300
  learning_rate: 0.0001
  save_checkpoints: true
  scheduler_factor: 0.1
  scheduler_patience: 5
  plot_loss: true
  plot_lr: true
  plot_acc: true
  criterion: MyCustomLoss
  optimzer: Adam
  lr_scheduler: StepLR
  top_k: 5
  print_stats: true
  pretrained: true
  # Trỏ thẳng đến file checkpoint bạn đang có
  pretrained_model: "C:/Users/Duc Do/Downloads/M3-SLR/best_checkpoints.pth"
  lr_step_size: 10
  gamma: 0.8
  num_accumulation_steps: 4
  patience: 15
  verbose: true
  delta: 0
  is_early_stopping: true
  gradient_clip_val: 1
  w_decay: 1e-4
  log_train_step: true
  log_steps: 50
  evaluate_step: 250
  evaluate_strategy: epoch

model:
  num_classes: 199
  maskFeat: False
  # UFOneView không cần chưng cất nên tắt phần pretrain model lằng nhằng này
  pretraiend: False