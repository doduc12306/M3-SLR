apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: m3-slr-infer
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/doduc12306/M3-SLR.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: m3-slr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
