apiVersion: apps/v1
kind: Deployment
metadata:
  name: m3-slr-infer
  namespace: m3-slr
  labels:
    app: m3-slr-infer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: m3-slr-infer
  template:
    metadata:
      labels:
        app: m3-slr-infer
    spec:
      containers:
        - name: m3-slr-infer
          image: ghcr.io/doduc12306/m3-slr:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
          args:
            - uvicorn app.server:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: cp-std
              mountPath: /app/cp_std.pth
              readOnly: true
            - name: cp-tec
              mountPath: /app/cp_tec.pth
              readOnly: true
          env:
            - name: MODEL_CONFIG
              value: configs/Uniformer/test_cfg/UsimKD_MultiVSL200.yaml
            - name: LOOKUP_TABLE
              value: data/MultiVSL200/lookuptable.csv
            - name: MODEL_DEVICE
              value: cpu
            - name: DEFAULT_TOP_K
              value: "5"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: cp-std
          hostPath:
            path: /home/bme/M3-SLR/cp_std.pth
            type: File
        - name: cp-tec
          hostPath:
            path: /home/bme/M3-SLR/cp_tec.pth
            type: File
