name: CD Update K8s Image Tag

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (example: sha-abc1234)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-kustomize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Update kustomization image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ github.event.inputs.image_tag }}|" deploy/k8s/kustomization.yaml
          sed -i "s|newName: .*|newName: ${IMAGE_NAME}|" deploy/k8s/kustomization.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/kustomization.yaml
          git commit -m "chore(cd): deploy image ${{ github.event.inputs.image_tag }}" || echo "No changes to commit"
          git push
